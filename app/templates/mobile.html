<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Agent Mobile</title>
    <style>
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #1c2333; --border: #2d333b;
            --text: #e6edf3; --dim: #8b949e; --accent: #e94560; --ok: #4ecca3;
            --red: #ff7b72; --green: #3fb950; --yellow: #d29922; --blue: #58a6ff;
            --magenta: #bc8cff; --cyan: #39c5cf;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
        body {
            display: flex; flex-direction: column;
            height: 100dvh;
        }

        /* --- Header --- */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: var(--bg2);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 8px; }

        .hdr-btn {
            width: 36px; height: 36px; border-radius: 8px; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform .1s, opacity .1s;
        }
        .hdr-btn:active { transform: scale(0.9); opacity: 0.7; }
        .hdr-btn svg { width: 20px; height: 20px; }

        .btn-burger { background: var(--bg3); }
        .btn-burger svg { fill: var(--text); }

        .btn-new {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--blue); border: none;
        }
        .btn-new svg { fill: #fff; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
        .status-dot.on { background: var(--ok); }

        .session-name {
            font-size: 14px; font-weight: 600; color: var(--text); max-width: 40vw;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Session drawer */
        .drawer-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
            z-index: 40;
        }
        .drawer-overlay.open { display: block; }
        .drawer {
            position: fixed; top: 0; left: -260px; width: 260px; height: 100%;
            background: var(--bg2); border-right: 1px solid var(--border);
            z-index: 41; transition: left .25s ease;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
        }
        .drawer.open { left: 0; }
        .drawer-title {
            padding: 16px; font-size: 15px; font-weight: 600; color: var(--dim);
            border-bottom: 1px solid var(--border);
        }
        .drawer-list {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .drawer-item {
            padding: 10px 16px; font-size: 15px; color: var(--text);
            border-bottom: 1px solid var(--border); cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .drawer-item:active { background: var(--bg3); }
        .drawer-item.active { color: var(--ok); }
        .drawer-item .dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--dim); flex-shrink: 0;
        }
        .drawer-item.active .dot { background: var(--ok); }
        .drawer-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .drawer-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .drawer-action {
            width: 30px; height: 30px; border-radius: 6px; border: none;
            background: transparent; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .drawer-action:active { background: var(--bg3); }
        .drawer-action svg { width: 16px; height: 16px; }
        .drawer-action.act-rename svg { fill: var(--dim); }
        .drawer-action.act-delete svg { stroke: var(--accent); fill: none; }

        /* --- Terminal output --- */
        .terminal-scroll {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 8px 10px; font-family: 'Menlo', 'Courier New', monospace;
            font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;
            background: var(--bg);
        }

        /* ANSI styles */
        .a-b { font-weight: 700; }
        .a-dim { opacity: 0.6; }
        .a-i { font-style: italic; }
        .a-u { text-decoration: underline; }
        .a-s { text-decoration: line-through; }
        /* Foreground */
        .a-30 { color: #484f58; } .a-31 { color: var(--red); } .a-32 { color: var(--green); }
        .a-33 { color: var(--yellow); } .a-34 { color: var(--blue); } .a-35 { color: var(--magenta); }
        .a-36 { color: var(--cyan); } .a-37 { color: #b1bac4; }
        /* Bright foreground */
        .a-90 { color: #6e7681; } .a-91 { color: #ffa198; } .a-92 { color: #56d364; }
        .a-93 { color: #e3b341; } .a-94 { color: #79c0ff; } .a-95 { color: #d2a8ff; }
        .a-96 { color: #56d4dd; } .a-97 { color: #ffffff; }
        /* Background */
        .a-bg40 { background: #484f58; } .a-bg41 { background: #5a1d28; }
        .a-bg42 { background: #1b4721; } .a-bg43 { background: #3d2e00; }
        .a-bg44 { background: #0c2d6b; } .a-bg45 { background: #3c1e70; }
        .a-bg46 { background: #0e3a3e; } .a-bg47 { background: #3b434b; }
        /* Bright background */
        .a-bg100 { background: #6e7681; } .a-bg101 { background: #8e3b46; }
        .a-bg102 { background: #2ea043; } .a-bg103 { background: #845d1a; }
        .a-bg104 { background: #1f6feb; } .a-bg105 { background: #8957e5; }
        .a-bg106 { background: #39c5cf; } .a-bg107 { background: #b1bac4; }

        /* --- Input area --- */
        .input-area {
            flex-shrink: 0; background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 8px 10px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
        }
        .input-row { display: flex; gap: 8px; align-items: flex-end; }

        /* Textarea wrapper with inline buttons */
        .input-wrap {
            flex: 1; position: relative; display: flex; align-items: flex-end;
            background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
            transition: border-color .2s;
        }
        .input-wrap:focus-within { border-color: var(--accent); }
        .input-wrap.has-voice { border-color: var(--ok); }

        .input-wrap textarea {
            flex: 1; background: transparent; color: var(--text); border: none;
            padding: 10px 12px; padding-right: 76px; font-size: 15px; font-family: inherit;
            resize: none; outline: none; min-height: 44px; max-height: 120px;
            line-height: 1.4;
        }

        /* Inline buttons inside textarea */
        .inline-btns {
            position: absolute; right: 6px; bottom: 6px;
            display: flex; gap: 4px; align-items: center;
        }
        .inline-btn {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform .1s, opacity .1s;
        }
        .inline-btn:active { transform: scale(0.85); opacity: 0.7; }
        .inline-btn svg { width: 18px; height: 18px; }

        .btn-clear { background: transparent; }
        .btn-clear svg { stroke: var(--dim); }

        .btn-mic { background: transparent; }
        .btn-mic svg { fill: var(--blue); }
        .btn-mic.recording { background: var(--accent); animation: pulse 1.5s infinite; }
        .btn-mic.recording svg { fill: #fff; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

        /* Send button (outside, right) */
        .btn-send {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: var(--ok); display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; cursor: pointer; transition: transform .1s, opacity .1s;
        }
        .btn-send:active { transform: scale(0.9); opacity: 0.8; }
        .btn-send svg { width: 22px; height: 22px; fill: var(--bg); }

        .mic-status {
            font-size: 12px; color: var(--dim); padding: 4px 0 2px;
        }

        /* Floating scroll-to-bottom button */
        .fab-down {
            position: absolute; right: 14px; bottom: 14px; z-index: 5;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg2); border: 1px solid var(--border);
            display: none; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.4);
            transition: opacity .2s, transform .2s;
        }
        .fab-down.show { display: flex; }
        .fab-down:active { transform: scale(0.9); }
        .fab-down svg { width: 20px; height: 20px; fill: var(--dim); }

        /* TTS play button */
        .tts-line { display: flex; align-items: flex-start; gap: 6px; margin: 2px 0; }
        .tts-text { flex: 1; }
        .tts-btn {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
            background: var(--blue); border: none; display: inline-flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: transform .1s, opacity .1s; vertical-align: middle;
        }
        .tts-btn:active { transform: scale(0.85); opacity: 0.7; }
        .tts-btn.playing { background: var(--accent); }
        .tts-btn svg { width: 14px; height: 14px; fill: #fff; }

        /* Auto-voice toggle */
        .voice-toggle {
            width: 36px; height: 36px; border-radius: 8px; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform .1s, background .2s;
            background: var(--bg3); position: relative;
        }
        .voice-toggle:active { transform: scale(0.9); }
        .voice-toggle svg { width: 20px; height: 20px; }
        .voice-toggle.on { background: var(--blue); }
        .voice-toggle.on svg { fill: #fff; }
        .voice-toggle:not(.on) svg { fill: var(--dim); }
        .voice-toggle .pulse-ring {
            display: none; position: absolute; inset: -3px; border-radius: 10px;
            border: 2px solid var(--blue); animation: voice-pulse 1.5s infinite;
        }
        .voice-toggle.on .pulse-ring { display: block; }
        @keyframes voice-pulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:0;transform:scale(1.15)} }

        /* Play last response button */
        .btn-play-last {
            width: 36px; height: 36px; border-radius: 8px; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform .1s; background: var(--bg3);
        }
        .btn-play-last:active { transform: scale(0.9); }
        .btn-play-last svg { width: 20px; height: 20px; fill: var(--ok); }
        .btn-play-last.playing svg { fill: var(--accent); }
    </style>
</head>
<body>

<!-- Session drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
    <div class="drawer-title">Сессии</div>
    <div class="drawer-list" id="drawerList"></div>
    <div style="padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px;">
        <button onclick="openPasswordModal()" style="flex:1; padding: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--dim); font-size: 13px; cursor: pointer;">Пароль</button>
        <a href="/logout" style="flex:1; padding: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); font-size: 13px; cursor: pointer; text-align: center; text-decoration: none;">Выход</a>
    </div>
</div>

<!-- Header -->
<div class="header">
    <div class="header-left">
        <button class="hdr-btn btn-burger" onclick="toggleDrawer()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
            </svg>
        </button>
        <div class="status-dot" id="statusDot"></div>
        <span class="session-name" id="sessionName" onclick="renameCurrentSession()">-- нет сессий --</span>
    </div>
    <div class="header-right">
        <button class="voice-toggle" id="voiceToggle" onclick="toggleAutoVoice()" title="Авто-озвучка">
            <span class="pulse-ring"></span>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
        </button>
        <button class="hdr-btn btn-new" onclick="openCreate()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </button>
    </div>
</div>

<!-- Hidden select for compatibility -->
<select id="sessionSelect" style="display:none;"><option value="">--</option></select>

<!-- Terminal output (scrollable) -->
<div style="position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column;">
    <div class="terminal-scroll" id="output"></div>
    <button class="fab-down" id="fabDown" onclick="scrollToBottom(); autoScroll=true;">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z"/>
        </svg>
    </button>
</div>

<!-- Input area -->
<div class="input-area">
    <div class="mic-status" id="micStatus"></div>
    <div class="input-row">
        <div class="input-wrap" id="inputWrap">
            <textarea id="inputText" rows="1" placeholder="Введите или надиктуйте..." enterkeyhint="send"></textarea>
            <div class="inline-btns">
                <button class="inline-btn btn-clear" id="btnClear" onclick="clearInput()" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
                        <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
                    </svg>
                </button>
                <button class="inline-btn btn-mic" id="micBtn" onclick="toggleMic()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </div>
        <button class="btn-send" onclick="sendInput()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/>
            </svg>
        </button>
    </div>
</div>

<!-- Create session (inline, not modal) -->
<div id="createPanel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50; display:none; align-items:center; justify-content:center;">
    <div style="background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; width:90%; max-width:360px;">
        <div style="font-size:15px; font-weight:600; color:var(--accent); margin-bottom:12px;">Новая сессия</div>
        <input id="cSessionId" placeholder="ID сессии" style="width:100%; padding:8px 10px; margin-bottom:8px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; outline:none;">
        <input id="cWorkdir" value="/workspace" style="width:100%; padding:8px 10px; margin-bottom:8px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; outline:none;">
        <select id="cCli" style="width:100%; padding:8px 10px; margin-bottom:12px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; outline:none;">
            <option value="claude" selected>Claude</option>
            <option value="gemini">Gemini</option>
            <option value="codex">Codex</option>
            <option value="qwen">Qwen</option>
        </select>
        <div style="display:flex; gap:8px;">
            <button onclick="closeCreate()" style="flex:1; padding:10px; border-radius:6px; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-size:14px;">Отмена</button>
            <button onclick="doCreate()" style="flex:1; padding:10px; border-radius:6px; background:var(--accent); border:none; color:white; font-size:14px; font-weight:600;">Создать</button>
        </div>
    </div>
</div>

<script>
const API = '';
let currentSession = null;
let pollTimer = null;
let lastOutput = '';
let autoScroll = true;

const outputEl = document.getElementById('output');
const inputEl = document.getElementById('inputText');
const selectEl = document.getElementById('sessionSelect');

// --- ANSI to HTML (full parser) ---
function ansiToHtml(text) {
    // Escape HTML
    let s = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // Strip non-SGR sequences
    s = s.replace(/\x1b\[\?[0-9;]*[a-zA-Z]/g, '');       // private modes
    s = s.replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, ''); // OSC
    s = s.replace(/\x1b\[[0-9;]*[A-HJKSTf]/g, '');        // cursor movement etc

    // Parse SGR (color/style) sequences
    let openSpans = 0;
    s = s.replace(/\x1b\[([0-9;]*)m/g, (_, params) => {
        const codes = params ? params.split(';').map(Number) : [0];
        let classes = [];
        let styles = [];
        let close = false;

        for (let i = 0; i < codes.length; i++) {
            const c = codes[i];
            if (c === 0) { close = true; continue; }
            if (c === 1) classes.push('a-b');
            else if (c === 2) classes.push('a-dim');
            else if (c === 3) classes.push('a-i');
            else if (c === 4) classes.push('a-u');
            else if (c === 9) classes.push('a-s');
            else if (c >= 30 && c <= 37) classes.push(`a-${c}`);
            else if (c >= 40 && c <= 47) classes.push(`a-bg${c}`);
            else if (c >= 90 && c <= 97) classes.push(`a-${c}`);
            else if (c >= 100 && c <= 107) classes.push(`a-bg${c}`);
            // 256 color: 38;5;N
            else if (c === 38 && codes[i+1] === 5 && codes[i+2] !== undefined) {
                styles.push(`color:${ansi256(codes[i+2])}`);
                i += 2;
            }
            // 256 color bg: 48;5;N
            else if (c === 48 && codes[i+1] === 5 && codes[i+2] !== undefined) {
                styles.push(`background:${ansi256(codes[i+2])}`);
                i += 2;
            }
            // RGB: 38;2;R;G;B
            else if (c === 38 && codes[i+1] === 2 && codes.length > i+4) {
                styles.push(`color:rgb(${codes[i+2]},${codes[i+3]},${codes[i+4]})`);
                i += 4;
            }
            // RGB bg: 48;2;R;G;B
            else if (c === 48 && codes[i+1] === 2 && codes.length > i+4) {
                styles.push(`background:rgb(${codes[i+2]},${codes[i+3]},${codes[i+4]})`);
                i += 4;
            }
        }

        let result = '';
        if (close) {
            // Close all open spans
            result += '</span>'.repeat(openSpans);
            openSpans = 0;
        }
        if (classes.length || styles.length) {
            let tag = '<span';
            if (classes.length) tag += ` class="${classes.join(' ')}"`;
            if (styles.length) tag += ` style="${styles.join(';')}"`;
            tag += '>';
            result += tag;
            openSpans++;
        }
        return result;
    });

    // Strip any remaining escape sequences
    s = s.replace(/\x1b[^\x1b]{0,8}/g, '');
    // Close unclosed spans
    s += '</span>'.repeat(openSpans);
    return s;
}

// 256-color palette
function ansi256(n) {
    // Standard 16
    const base = [
        '#484f58','#ff7b72','#3fb950','#d29922','#58a6ff','#bc8cff','#39c5cf','#b1bac4',
        '#6e7681','#ffa198','#56d364','#e3b341','#79c0ff','#d2a8ff','#56d4dd','#ffffff'
    ];
    if (n < 16) return base[n];
    if (n >= 232) { const g = 8 + (n - 232) * 10; return `rgb(${g},${g},${g})`; }
    // 6x6x6 cube (16-231)
    const idx = n - 16;
    const r = Math.floor(idx / 36), g = Math.floor((idx % 36) / 6), b = idx % 6;
    const val = c => c ? 55 + c * 40 : 0;
    return `rgb(${val(r)},${val(g)},${val(b)})`;
}

// --- Terminal output polling ---
async function pollOutput() {
    if (!currentSession) return;
    try {
        const res = await fetch(`${API}/sessions/${currentSession}/tail?full=true`);
        if (res.status === 401) { location.href = '/login'; return; }
        const data = await res.json();
        const raw = data.output || '';
        if (raw !== lastOutput) {
            // Auto-voice: process new content
            if (autoVoice) processAutoVoice(raw);

            lastOutput = raw;
            let html = ansiToHtml(raw);
            // Replace 🔊 lines with TTS play buttons
            html = html.replace(/🔊\s*(.+?)(?=\n|$)/g, (_, text) => {
                const clean = text.replace(/<[^>]*>/g, '').trim();
                const encoded = clean.replace(/'/g, '&#39;');
                return `<span class="tts-line"><span class="tts-text">🔊 ${text}</span><button class="tts-btn" onclick="playTTS('${encoded}', this)" title="Озвучить"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button></span>`;
            });
            outputEl.innerHTML = html;
            if (autoScroll) scrollToBottom();
        }
        document.getElementById('statusDot').classList.add('on');
    } catch {
        document.getElementById('statusDot').classList.remove('on');
    }
}

function startPolling() {
    stopPolling();
    pollOutput();
    pollTimer = setInterval(pollOutput, 1000);
}

function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function scrollToBottom() {
    outputEl.scrollTop = outputEl.scrollHeight;
}

// Track if user scrolled up manually + show/hide FAB
const fabDown = document.getElementById('fabDown');
outputEl.addEventListener('scroll', () => {
    const atBottom = outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 30;
    const scrolledUp = outputEl.scrollHeight - outputEl.scrollTop - outputEl.clientHeight > outputEl.clientHeight;
    autoScroll = atBottom;
    fabDown.classList.toggle('show', scrolledUp && !atBottom);
});

// --- Drawer ---
function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
}
function toggleDrawer() {
    const isOpen = document.getElementById('drawer').classList.contains('open');
    isOpen ? closeDrawer() : openDrawer();
}
function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
}

// Swipe left→right anywhere to open drawer (two-finger or single from left half)
(function() {
    let startX = null, startY = null;
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const t = e.touches[0];
        // Start tracking from left half of screen
        if (t.clientX < window.innerWidth * 0.5) {
            startX = t.clientX;
            startY = t.clientY;
        }
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
        if (startX === null) return;
        const dx = e.touches[0].clientX - startX;
        const dy = Math.abs(e.touches[0].clientY - startY);
        // Horizontal swipe > 80px, mostly horizontal
        if (dx > 80 && dy < 40) {
            openDrawer();
            startX = null;
        }
        // Cancel if scrolling vertically
        if (dy > 40) startX = null;
    }, { passive: true });
    document.addEventListener('touchend', () => { startX = null; }, { passive: true });
})();
function switchSession(id) {
    if (id === currentSession) { closeDrawer(); return; }
    currentSession = id;
    selectEl.value = id;
    lastOutput = '';
    outputEl.innerHTML = '';
    autoScroll = true;
    updateSessionName();
    updateDrawerList();
    startPolling();
    closeDrawer();
}
function updateSessionName() {
    const name = currentSession ? (sessionNames[currentSession] || currentSession) : '-- нет сессий --';
    document.getElementById('sessionName').textContent = name;
}
function updateDrawerList() {
    const list = document.getElementById('drawerList');
    const items = Array.from(selectEl.options).filter(o => o.value);
    list.innerHTML = items.map(o => {
        const active = o.value === currentSession ? ' active' : '';
        const name = sessionNames[o.value] || o.value;
        return `<div class="drawer-item${active}">
            <span class="dot"></span>
            <span class="drawer-item-name" onclick="switchSession('${o.value}')">${name}</span>
            <div class="drawer-item-actions">
                <button class="drawer-action act-rename" onclick="event.stopPropagation(); renameSession('${o.value}')">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </button>
                <button class="drawer-action act-delete" onclick="event.stopPropagation(); deleteSessionById('${o.value}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/><path d="M10 11v6"/><path d="M14 11v6"/>
                    </svg>
                </button>
            </div>
        </div>`;
    }).join('');
}

// Session display names (local only)
let sessionNames = JSON.parse(localStorage.getItem('sessionNames') || '{}');
function saveSessionNames() { localStorage.setItem('sessionNames', JSON.stringify(sessionNames)); }

function renameCurrentSession() {
    if (currentSession) renameSession(currentSession);
}

function renameSession(id) {
    const current = sessionNames[id] || id;
    const name = prompt('Название сессии:', current);
    if (name === null) return;
    const trimmed = name.trim();
    if (trimmed && trimmed !== id) {
        sessionNames[id] = trimmed;
    } else {
        delete sessionNames[id];
    }
    saveSessionNames();
    updateSessionName();
    updateDrawerList();
}

async function deleteSessionById(id) {
    if (!confirm(`Удалить "${sessionNames[id] || id}"?`)) return;
    if (id === currentSession) {
        stopPolling();
        currentSession = null;
        outputEl.innerHTML = '';
    }
    await fetch(`${API}/sessions/${id}`, { method: 'DELETE' });
    delete sessionNames[id];
    saveSessionNames();
    await loadSessions();
    closeDrawer();
}

// --- Sessions ---
async function loadSessions() {
    try {
        const res = await fetch(`${API}/health`);
        if (res.status === 401) { location.href = '/login'; return; }
        const data = await res.json();
        const prev = selectEl.value;

        selectEl.innerHTML = '';
        if (data.sessions.length === 0) {
            selectEl.innerHTML = '<option value="">--</option>';
            currentSession = null;
            stopPolling();
            updateSessionName();
            updateDrawerList();
            return;
        }

        data.sessions.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s; opt.textContent = s;
            selectEl.appendChild(opt);
        });

        selectEl.value = (prev && data.sessions.includes(prev)) ? prev : data.sessions[0];

        if (currentSession !== selectEl.value) {
            currentSession = selectEl.value;
            lastOutput = '';
            startPolling();
        }
        updateSessionName();
        updateDrawerList();
    } catch {}
}

async function deleteSession() {
    if (!currentSession) return;
    deleteSessionById(currentSession);
}

// --- Create session ---
function openCreate() {
    const p = document.getElementById('createPanel');
    p.style.display = 'flex';
}
function closeCreate() {

}
async function doCreate() {
    const id = document.getElementById('cSessionId').value.trim();
    const workdir = document.getElementById('cWorkdir').value.trim();
    const cli = document.getElementById('cCli').value;

    outputEl.innerHTML = `<span class="ansi-dim">Создаю сессию "${id}"...</span>`;

    const res = await fetch(`${API}/sessions`, {
        method: 'POST',

    if (!res.ok) {
        const d = await res.json().catch(() => ({}));

        return;
    }
    currentSession = id;
    lastOutput = '';
    autoScroll = true;

}

// --- Send text input ---
async function sendInput() {
    const text = inputEl.value.trim();
    if (!text || !currentSession) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('inputWrap').classList.remove('has-voice');

        method: 'POST',

    });

}

function clearInput() {
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('inputWrap').classList.remove('has-voice');
    document.getElementById('btnClear').style.display = 'none';

}

function updateClearBtn() {

// --- Voice (ASR) ---
let mediaRecorder = null;
let isRecording = false;
let recTimer = null;
let recSec = 0;
let pendingChunks = [];

function encodeWav(samples, sampleRate) {
    const buf = new ArrayBuffer(44 + samples.length * 2);
    const v = new DataView(buf);
    const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    w(0,'RIFF'); v.setUint32(4, 36 + samples.length*2, true);
    w(8,'WAVE'); w(12,'fmt '); v.setUint32(16,16,true);
    v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sampleRate,true); v.setUint32(28,sampleRate*2,true);
    v.setUint16(32,2,true); v.setUint16(34,16,true);
    w(36,'data'); v.setUint32(40,samples.length*2,true);
    for (let i = 0; i < samples.length; i++) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        v.setInt16(44+i*2, s<0?s*0x8000:s*0x7FFF, true);
    }
    return new Blob([buf], { type: 'audio/wav' });
}

async function webmToWav(blob) {
    const ab = await blob.arrayBuffer();
    const ctx = new AudioContext();
    const dec = await ctx.decodeAudioData(ab);
    const samples = dec.getChannelData(0);
    ctx.close();
    return encodeWav(samples, dec.sampleRate);
}

function appendToInput(text) {
    if (!text) return;
    if (inputEl.value) {
        inputEl.value += ' ' + text;
    } else {
        inputEl.value = text;
    }
    document.getElementById('inputWrap').classList.add('has-voice');
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    updateClearBtn();
    inputEl.focus();
}

async function toggleMic() {
    const btn = document.getElementById('micBtn');
    const status = document.getElementById('micStatus');

    if (isRecording) { mediaRecorder.stop(); return; }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', ''];
        let mime = '';
        for (const t of types) {
            if (!t || MediaRecorder.isTypeSupported?.(t)) { mime = t; break; }
        }
        mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
        pendingChunks = [];

        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) pendingChunks.push(e.data); };

        mediaRecorder.onstop = async () => {
            isRecording = false;
            clearInterval(recTimer); recSec = 0;
            btn.classList.remove('recording');
            stream.getTracks().forEach(t => t.stop());

            if (pendingChunks.length > 0) {
                const chunks = [...pendingChunks]; pendingChunks = [];
                status.textContent = 'Распознаю...';
                try {
                    let blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    const mt = mediaRecorder.mimeType || '';
                    if (mt.includes('webm') || mt.includes('opus')) blob = await webmToWav(blob);
                    const fd = new FormData();
                    fd.append('audio', blob, 'recording.wav');
                    const res = await fetch(`${API}/asr`, { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.text) {
                        appendToInput(data.text);
                        status.textContent = 'Проверьте и отправьте';
                    } else {
                        status.textContent = 'Речь не распознана';
                    }
                } catch (err) {
                    status.textContent = 'Ошибка ASR';
                }
            }
            setTimeout(() => { status.textContent = ''; }, 4000);
        };

        mediaRecorder.start();
        isRecording = true; recSec = 0;
        btn.classList.add('recording');
        status.textContent = '0:00 — говорите...';
        recTimer = setInterval(() => {
            recSec++;
            status.textContent = `${Math.floor(recSec/60)}:${String(recSec%60).padStart(2,'0')} — говорите...`;
        }, 1000);
    } catch { alert('Нет доступа к микрофону'); }
}

// --- TTS ---
let currentAudio = null;
let currentTTSBtn = null;
let autoVoice = localStorage.getItem('autoVoice') === 'true';
let lastVoicedOutput = '';
let ttsQueue = [];
let ttsPlaying = false;

// Init toggle state
if (autoVoice) document.getElementById('voiceToggle').classList.add('on');

function toggleAutoVoice() {
    autoVoice = !autoVoice;
    localStorage.setItem('autoVoice', autoVoice);
    document.getElementById('voiceToggle').classList.toggle('on', autoVoice);
    if (autoVoice) {
        // Reset baseline so we don't voice old output
        lastVoicedOutput = lastOutput;
    } else {
        // Stop any playing audio
        ttsQueue = [];
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    }
}

// Strip ANSI codes from raw text
function stripAnsi(text) {
    return text
        .replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')
        .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '')
        .replace(/\x1b[^\x1b]{0,8}/g, '');
}

// Filter lines: keep meaningful natural language, skip code/noise
function extractVoiceableText(raw) {
    const clean = stripAnsi(raw);
    const lines = clean.split('\n');
    const meaningful = [];

    for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        // Skip common noise patterns
        if (trimmed.length < 5) continue;
        if (/^[\s]*[{}\[\]<>\/\\|`~#$%^&*+=;]/.test(trimmed)) continue;  // code-like
        if (/^(import |from |def |class |const |let |var |function |async |await |return |if |else |for |while )/.test(trimmed)) continue;
        if (/^\d+[→│|]/.test(trimmed)) continue;  // line numbers
        if (/^[─━═╔╗╚╝├┤┬┴┼]/.test(trimmed)) continue;  // box drawing
        if (/^(INFO:|WARNING:|ERROR:|DEBUG:|\[)/.test(trimmed)) continue;  // logs
        if (/^\s{4,}/.test(line)) continue;  // indented code
        if (/^[-*] \[/.test(trimmed)) continue;  // markdown task lists
        if (/\.(py|js|ts|html|css|json|sh|md|yml|yaml|toml)[:( ]/.test(trimmed)) continue;  // file refs in tool output
        // Keep lines that look like natural language
        if (/[а-яА-ЯёЁa-zA-Z]{3,}/.test(trimmed) && trimmed.length > 10) {
            meaningful.push(trimmed);
        }
    }
    return meaningful.join('. ');
}

// Queue TTS and play sequentially
async function queueTTS(text) {
    if (!text || text.length < 10) return;
    // Limit text length for TTS
    const limited = text.length > 500 ? text.substring(0, 500) + '...' : text;
    ttsQueue.push(limited);
    if (!ttsPlaying) playNextTTS();
}

async function playNextTTS() {
    if (ttsQueue.length === 0) { ttsPlaying = false; return; }
    ttsPlaying = true;
    const text = ttsQueue.shift();

    try {
        const res = await fetch(`${API}/tts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
        });
        if (!res.ok) { playNextTTS(); return; }
        const data = await res.json();
        if (!data.url) { playNextTTS(); return; }

        currentAudio = new Audio(data.url);
        currentAudio.onended = () => { currentAudio = null; playNextTTS(); };
        currentAudio.onerror = () => { currentAudio = null; playNextTTS(); };
        currentAudio.play();
    } catch {
        playNextTTS();
    }
}

// Called from pollOutput when new content detected & autoVoice is on
function processAutoVoice(raw) {
    if (!autoVoice || !raw) return;

    // Find what's new
    let newPart = raw;
    if (lastVoicedOutput && raw.startsWith(lastVoicedOutput)) {
        newPart = raw.substring(lastVoicedOutput.length);
    } else if (lastVoicedOutput) {
        // Output changed substantially — find common prefix
        let i = 0;
        while (i < lastVoicedOutput.length && i < raw.length && lastVoicedOutput[i] === raw[i]) i++;
        newPart = raw.substring(i);
    }
    lastVoicedOutput = raw;

    if (!newPart || newPart.length < 20) return;

    const voiceable = extractVoiceableText(newPart);
    if (voiceable && voiceable.length > 15) {
        queueTTS(voiceable);
    }
}

async function playTTS(text, btn) {
    // If same button clicked while playing — stop
    if (currentAudio && currentTTSBtn === btn) {
        currentAudio.pause();
        currentAudio = null;
        btn.classList.remove('playing');
        currentTTSBtn = null;
        return;
    }
    // Stop previous
    if (currentAudio) {
        currentAudio.pause();
        if (currentTTSBtn) currentTTSBtn.classList.remove('playing');
    }

    btn.classList.add('playing');
    currentTTSBtn = btn;

    try {
        const res = await fetch(`${API}/tts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
        });
        if (!res.ok) { btn.classList.remove('playing'); currentTTSBtn = null; return; }
        const data = await res.json();
        if (!data.url) { btn.classList.remove('playing'); currentTTSBtn = null; return; }
        currentAudio = new Audio(data.url);
        currentAudio.onended = () => {
            btn.classList.remove('playing');
            currentTTSBtn = null;
            currentAudio = null;
        };
        currentAudio.onerror = () => {
            btn.classList.remove('playing');
            currentTTSBtn = null;
            currentAudio = null;
        };
        currentAudio.play();
    } catch {
        btn.classList.remove('playing');
        currentTTSBtn = null;
    }
}

// --- Password modal ---
function openPasswordModal() {
    closeDrawer();
    document.getElementById('pwdModal').style.display = 'flex';
    document.getElementById('pwdCurrent').value = '';
    document.getElementById('pwdNew').value = '';
    document.getElementById('pwdConfirm').value = '';
    document.getElementById('pwdMsg').textContent = '';
    document.getElementById('pwdMsg').style.display = 'none';
}
function closePasswordModal() {
    document.getElementById('pwdModal').style.display = 'none';
}
async function doChangePassword() {
    const msgEl = document.getElementById('pwdMsg');
    const cur = document.getElementById('pwdCurrent').value;
    const np = document.getElementById('pwdNew').value;
    const nc = document.getElementById('pwdConfirm').value;
    if (!cur || !np) { msgEl.textContent = 'Заполните все поля'; msgEl.style.color = 'var(--accent)'; msgEl.style.display = 'block'; return; }
    if (np !== nc) { msgEl.textContent = 'Пароли не совпадают'; msgEl.style.color = 'var(--accent)'; msgEl.style.display = 'block'; return; }
    try {
        const res = await fetch(`${API}/change-password`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current_password: cur, new_password: np }),
        });
        if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            msgEl.textContent = d.detail || 'Ошибка'; msgEl.style.color = 'var(--accent)'; msgEl.style.display = 'block';
            return;
        }
        msgEl.textContent = 'Пароль изменён!'; msgEl.style.color = 'var(--ok)'; msgEl.style.display = 'block';
        setTimeout(closePasswordModal, 1500);
    } catch { msgEl.textContent = 'Ошибка сети'; msgEl.style.color = 'var(--accent)'; msgEl.style.display = 'block'; }
}

setInterval(loadSessions, 15000);
